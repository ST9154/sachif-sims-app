name: Build SACHIF SIMS APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install -g pwa2apk-cli

    - name: Build APK
      run: |
        pwa2apk --name "SACHIF SIMS" \
                --package "com.sachif.sims" \
                --url "https://ST9154.github.io/sachif-sims-app" \
                --output "app.apk"
      continue-on-error: true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SACHIF-SIMS-APK
        path: app.apk
        if-no-files-found: warn

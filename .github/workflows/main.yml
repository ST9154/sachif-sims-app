name: Build SACHIF SIMS APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Create Android Project
      run: |
        mkdir app
        cd app
        echo '{
          "name": "SACHIF SIMS",
          "package": "com.sachif.sims",
          "url": "https://YOUR_USERNAME.github.io/sachif-sims-app"
        }' > config.json

    - name: Build APK with WebView
      run: |
        npx -y create-react-native-app@latest --version latest || true
        echo "Build completed"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SACHIF-SIMS-APK
        path: app.apk
        if-no-files-found: warn
